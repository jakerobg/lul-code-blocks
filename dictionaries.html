<style>
  .lul-dicts {
    --lul-header: #393348;
    --lul-text: #333333;
    --lul-accent: #E0E5C2;
    --lul-card: #fafaf7;
    --lul-border: rgba(57, 51, 72, 0.08);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--lul-text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    max-width: none;
    width: 100%;
    margin: 0;
    padding: 8px 0;
    box-sizing: border-box;
  }
  .lul-dicts *, .lul-dicts *::before, .lul-dicts *::after { box-sizing: border-box; }

  .lul-dicts__grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 320px));
    justify-content: center;
    gap: 24px;
    padding: 12px 15px 16px;
  }

  .lul-card {
    background: var(--lul-card);
    border: 1px solid var(--lul-border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
    box-shadow: 0 1px 3px rgba(57, 51, 72, 0.05);
  }
  .lul-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(57, 51, 72, 0.08);
  }

  .lul-card__media {
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    position: relative;
  }
  .lul-card__media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s ease;
  }
  .lul-card:hover .lul-card__media img { transform: scale(1.01); }

  .lul-card__body {
    padding: 28px 25px 32px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .lul-card__title {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 1.55rem;
    font-weight: 500;
    color: var(--lul-header);
    margin: 0 0 60px;
    letter-spacing: -0.015em;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .lul-card__btn {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    align-self: stretch;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #393347;
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    font-size: 1rem;
    padding: 14px 18px;
    border-radius: 0;
    transition: background 0.25s ease, gap 0.25s ease;
    border: none;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .lul-card__btn:hover {
    background: #4c4460;
    gap: 12px;
  }
  .lul-card__btn svg {
    width: 16px;
    height: 16px;
    transition: transform 0.25s ease;
  }
  .lul-card__btn:hover svg { transform: translateX(2px); }

  @media (max-width: 1200px) {
    .lul-dicts__grid { grid-template-columns: repeat(2, minmax(0, 360px)); }
    .lul-card__title { margin-bottom: 40px; }
  }
  @media (max-width: 620px) {
    .lul-dicts__grid { grid-template-columns: minmax(0, 420px); gap: 16px; padding: 8px 16px 12px; }
    .lul-card__body { padding: 22px 22px 26px; }
    .lul-card__title { font-size: 1.4rem; margin-bottom: 40px; }
  }
</style>

<section class="lul-dicts" aria-label="Dictionaries">
  <div class="lul-dicts__grid" id="lul-dicts-grid"></div>
</section>

<script>
  (function () {
    const items = [
      {
        title: "Zoning Attributes",
        img: "https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/6edf6009-9a37-4664-b14a-5a8b1557ffcf/districts.png?format=2500w",
        href: "https://docs.google.com/spreadsheets/d/1FNYAjlZCrAQA6NpFMHNOmWB0M5hLF3lQWlb2Wt26_Ws/edit?gid=0#gid=0"
      },
      {
        title: "Zoning Districts",
        img: "https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/9d91e4bd-bc6d-4bc0-957a-a4d8d759ea89/districts_updated.png?format=2500w",
        href: "https://docs.google.com/spreadsheets/d/1FNYAjlZCrAQA6NpFMHNOmWB0M5hLF3lQWlb2Wt26_Ws/edit?gid=788862954#gid=788862954"
      },
      {
        title: "Zoning Slices",
        img: "https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/9e7b5122-eef7-4692-ba53-1c3169978bf0/slices_updated.png?format=2500w",
        href: "https://docs.google.com/spreadsheets/d/1FNYAjlZCrAQA6NpFMHNOmWB0M5hLF3lQWlb2Wt26_Ws/edit?gid=1614967331#gid=1614967331"
      },
      {
        title: "Zoning Tables",
        img: "https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/ef841a28-ba11-455e-a291-f94fc1a6b9ec/table.png?format=1500w",
        href: "https://docs.google.com/spreadsheets/d/1FNYAjlZCrAQA6NpFMHNOmWB0M5hLF3lQWlb2Wt26_Ws/edit?gid=1152307855#gid=1152307855"
      }
    ];

    const arrow = '<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 10h12m0 0l-5-5m5 5l-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const grid = document.getElementById("lul-dicts-grid");
    if (!grid) return;

    grid.innerHTML = items.map(function (p) {
      return '<article class="lul-card">' +
               '<div class="lul-card__media">' +
                 '<img src="' + p.img + '" alt="' + p.title + '" loading="lazy" />' +
               '</div>' +
               '<div class="lul-card__body">' +
                 '<h3 class="lul-card__title">' + p.title + '</h3>' +
                 '<a class="lul-card__btn" href="' + p.href + '" target="_blank" rel="noopener">View Dictionary ' + arrow + '</a>' +
               '</div>' +
             '</article>';
    }).join("");
  })();
</script>
