<!--
  Coverage Stats — RESTYLED to match the page's editorial / Product-Specifications
  language. Changes vs. the original:
    • Removed the drop shadow and the solid light tiles (nothing else on the page
      uses shadows; filled blocks felt heavy on the plum band).
    • Numbers now sit directly on the plum inside a delicate hairline grid — the
      same connected-cell, no-fill treatment as the Product Specifications block.
    • Uppercase label moved ABOVE the number (eyebrow-first), matching how the
      spec cards and the rest of the page read.
    • Self-contained dark plum background so it looks right regardless of the
      Squarespace section's own background color. If your section is already
      plum, the color simply matches — no double band.
  All JS / count-up / live-API logic is UNCHANGED from your version.
  Self-contained; all classes prefixed lul-cov- to avoid collisions.
-->
<section class="lul-cov" aria-label="Data coverage statistics">
    <style>
        .lul-cov {
            --lul-bg: #393348; /* plum band background     */
            --lul-card: #eeecef; /* gray box fill            */
            --lul-ink: #393348; /* plum number (on gray box)*/
            --lul-line: rgba(57, 51, 72, 0.12); /* box hairline border      */
            --lul-sub: rgba(57, 51, 72, 0.7); /* eyebrow label            */
            --lul-invert-ink: #eeecef; /* cream text/keyline — ghost product-spec tile */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--lul-ink);
            background: var(--lul-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            width: 100%;
            box-sizing: border-box;
            padding: 56px 24px;
        }
        .lul-cov *,
        .lul-cov *::before,
        .lul-cov *::after {
            box-sizing: border-box;
        }
        /* smaller boxes, centered on the gray band */
        .lul-cov__grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 20px;
            max-width: 880px;
            margin: 0 auto;
        }
        .lul-cov__card {
            background: var(--lul-card);
            border: 1px solid var(--lul-line);
            border-radius: 0;
            box-shadow: none;
            padding: 26px 18px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center; /* center horizontally               */
            justify-content: space-between; /* label pinned top, number pinned bottom */
            text-align: center;
        }
        /* eyebrow label — order:-1 lifts it ABOVE the number without
           touching the JS. min-height reserves 2 lines so 1-line and
           2-line labels align across cards. */
        .lul-cov__sub {
            order: -1;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            line-height: 1.35;
            color: var(--lul-sub);
            margin: 0;
            min-height: 2.7em;
            display: flex;
            align-items: flex-start; /* first line of every label aligns at the top */
            justify-content: center;
        }
        .lul-cov__num {
            font-weight: 400;
            font-size: clamp(2.3rem, 3.2vw, 2.9rem);
            line-height: 1;
            letter-spacing: -0.03em;
            color: var(--lul-ink);
            margin: 0;
        }
        .lul-cov__plus {
            font-size: 0.55em;
            font-weight: 400;
            margin-left: 0.1em;
            vertical-align: 0.55em;
            color: var(--lul-sub);
        }
        /* product-spec card — same size/position as the coverage tiles,
           but a transparent "ghost" tile: cream keyline + cream text on the
           plum band, so it reads as a different class of figure (a product
           detail) using only the band's own palette (no new hue). */
        .lul-cov__card--accent {
            background: transparent;
            border-color: rgba(238, 236, 239, 0.45);
        }
        .lul-cov__card--accent .lul-cov__num {
            color: var(--lul-invert-ink);
        }
        .lul-cov__card--accent .lul-cov__sub {
            color: rgba(238, 236, 239, 0.78);
        }
        .lul-cov__card--accent .lul-cov__plus {
            color: rgba(238, 236, 239, 0.6);
        }
        @media (max-width: 900px) {
            .lul-cov__grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                max-width: 460px;
            }
            .lul-cov {
                padding: 44px 20px;
            }
        }
        @media (max-width: 480px) {
            .lul-cov__grid {
                grid-template-columns: 1fr;
                max-width: 300px;
            }
            .lul-cov__sub {
                min-height: 0;
                margin-bottom: 10px;
            }
        }
    </style>
    <div class="lul-cov__grid" id="lul-cov-grid"></div>
    <script>
        (function () {
            var root = document.currentScript.closest(".lul-cov");
            if (!root) return;
            var grid = root.querySelector("#lul-cov-grid");
            if (!grid) return;
            var API = "https://api.zoningatlas.org/nza_coverage";
            /* ════════════════════════════════════════════════════════════
               1) CHOOSE THE 4 CARDS (in display order). Each entry is either:
                    • a metric KEY (string) from the METRICS registry → fetched live
                    • a HARDCODED card object: { value: 158000000, label: "parcels included" }
                  Mix and match, e.g. 3 live + 1 hardcoded, or all 4 live.
               ════════════════════════════════════════════════════════════ */
            var SELECTED = [
                { value: 90000000, label: "parcels", plus: true },
                "housing_units",
                "population",
                { value: 120, label: "zoning rules offered", plus: false, accent: true },
            ];
            /* Show the "+" marker after each number? true = on, false = off.
               A hardcoded card can override this with its own `plus:` property,
               e.g. { value: 186, label: "zoning rules offered", plus: false }. */
            var SHOW_PLUS = true;
            /* ════════════════════════════════════════════════════════════
               2) METRICS REGISTRY — every fetchable stat. Each shows the
                  raw `field` count as the big number (with K / M / B) and
                  `sub` as the uppercase label. `fallback` is used if the
                  live fetch fails.
               ════════════════════════════════════════════════════════════ */
            var METRICS = {
                population: {
                    field: "population_covered",
                    sub: "residents",
                    fallback: 216798958,
                },
                acres: { field: "acres_covered", sub: "acres covered", fallback: 1416006966 },
                census_tracts: { field: "tracts_covered", sub: "census tracts covered", fallback: 50547 },
                block_groups: { field: "blockgroups_covered", sub: "block groups covered", fallback: 142719 },
                jurisdictions: { field: "jurisdictions_covered", sub: "jurisdictions analyzed", fallback: 10509 },
                pages: { field: "pages_analyzed", sub: "zoning pages read", fallback: 1261957 },
                housing_units: { field: "housing_units_covered", sub: "housing units", fallback: 92236215 },
                slices: { field: "slices_total", sub: "slices analyzed", fallback: 169240 },
                districts: { field: "districts_published", sub: "zoning districts analyzed", fallback: 114355 },
            };
            var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            // ── Number formatting ──────────────────────────────────────
            // One decimal, dropping a trailing ".0" (e.g. 2.30 → "2.3").
            function oneDp(x) {
                return (Math.round(x * 10) / 10).toFixed(1).replace(/\.0$/, "");
            }
            // Big whole numbers: commas up to 99,999; then K / M / B.
            function abbr(n) {
                var a = Math.abs(n);
                if (a >= 1e9) return oneDp(n / 1e9) + "B";
                if (a >= 1e6) return oneDp(n / 1e6) + "M";
                if (a > 99999) return oneDp(n / 1e3) + "K";
                return Math.round(n).toLocaleString("en-US");
            }
            // Number + a smaller trailing "+" (e.g. 216.8M+). `show` is the
            // per-card plus flag (defaults on if omitted).
            function withPlus(n, show) {
                if (show === false) return abbr(n);
                return abbr(n) + '<span class="lul-cov__plus">+</span>';
            }
            // ── Build the cards from SELECTED ──────────────────────────
            // Each entry resolves to a def { field (null if hardcoded), sub, fallback, plus }.
            // `plus` defaults to SHOW_PLUS, but a hardcoded card can override it
            // per-card via a `plus: false` (or true) property.
            var defs = SELECTED.map(function (entry) {
                if (typeof entry === "string") {
                    var m = METRICS[entry];
                    if (!m) {
                        // unknown key → warn so the card isn't silently dropped
                        console.warn('[coverage_stats] unknown metric key: "' + entry + '"');
                        return null;
                    }
                    return { field: m.field, sub: m.sub, fallback: m.fallback, plus: SHOW_PLUS };
                }
                return {
                    field: null,
                    sub: entry.label,
                    fallback: entry.value,
                    plus: entry.plus !== undefined ? entry.plus : SHOW_PLUS,
                    accent: entry.accent === true,
                };
            }).filter(Boolean);
            var records = []; // { el, subEl, def, target }
            defs.forEach(function (def) {
                var card = document.createElement("article");
                card.className = "lul-cov__card" + (def.accent ? " lul-cov__card--accent" : "");
                var num = document.createElement("p");
                num.className = "lul-cov__num";
                num.textContent = "—";
                var sub = document.createElement("p");
                sub.className = "lul-cov__sub";
                card.appendChild(num);
                card.appendChild(sub);
                grid.appendChild(card);
                records.push({ el: num, subEl: sub, def: def, target: null });
            });
            // ── Fill each card from a data row (API row, or null → fallback) ──
            function num(row, field) {
                return field && row && typeof row[field] === "number" ? row[field] : null;
            }
            function populate(row) {
                records.forEach(function (rec) {
                    var def = rec.def;
                    var val = num(row, def.field);
                    if (val === null && typeof def.fallback === "number") val = def.fallback;
                    rec.subEl.textContent = def.sub;
                    rec.target = typeof val === "number" ? val : null;
                    if (rec.target === null) rec.el.textContent = "—";
                    else rec.el.innerHTML = withPlus(rec.target, def.plus);
                });
            }
            // ── Animation ──────────────────────────────────────────────
            function countUp(rec) {
                if (rec.target === null) return;
                var duration = 1000;
                var start = null;
                function frame(now) {
                    if (start === null) start = now;
                    var p = Math.min((now - start) / duration, 1);
                    var eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
                    // number only while counting; the "+" appears once it lands
                    if (p < 1) {
                        rec.el.textContent = abbr(rec.target * eased);
                        requestAnimationFrame(frame);
                    } else {
                        rec.el.innerHTML = withPlus(rec.target, rec.def.plus);
                    }
                }
                requestAnimationFrame(frame);
            }
            var started = false;
            function begin() {
                if (started) return;
                started = true;
                if (reduce || !("IntersectionObserver" in window)) {
                    records.forEach(function (rec) {
                        if (rec.target !== null) rec.el.innerHTML = withPlus(rec.target, rec.def.plus);
                    });
                    return;
                }
                var byEl = new Map();
                records.forEach(function (rec) {
                    byEl.set(rec.el, rec);
                });
                var io = new IntersectionObserver(
                    function (entries) {
                        entries.forEach(function (entry) {
                            if (entry.isIntersecting) {
                                countUp(byEl.get(entry.target));
                                io.unobserve(entry.target);
                            }
                        });
                    },
                    { threshold: 0.4 },
                );
                records.forEach(function (rec) {
                    io.observe(rec.el);
                });
            }
            // ── Fetch live data, then animate (fall back on failure/timeout) ──
            var timer = setTimeout(function () {
                populate(null);
                begin();
            }, 2500);
            fetch(API, { headers: { Accept: "application/json" } })
                .then(function (r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(function (data) {
                    var row = Array.isArray(data) ? data[0] : data;
                    populate(row || null);
                })
                .catch(function () {
                    populate(null); // keep hardcoded fallbacks where available
                })
                .then(function () {
                    clearTimeout(timer);
                    begin();
                });
        })();
    </script>
</section>
