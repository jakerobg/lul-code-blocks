<!--
  Zoning Districts — animated hero graphic (Squarespace Code Block)
  Paste this whole block into a Code Block where you want the graphic to
  appear (e.g. the empty column next to your hero text/CTAs).
  Self-contained: no external dependencies, all styles scoped under
  .lul-districts-anim so it won't collide with Squarespace's own CSS.
-->
<div class="lul-districts-anim">
    <style>
        .lul-districts-anim,
        .lul-districts-anim * {
            box-sizing: border-box;
        }
        .lul-districts-anim {
            --lda-navy: #393348;
            --lda-sage: #e0e5c2;
            --lda-white: #fff;
            --lda-muted: rgba(57, 51, 72, 0.6);
            --lda-border: rgba(57, 51, 72, 0.15);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            max-width: 720px;
            background: #efedec; /* matches product-tabs bg */
            padding: 32px;
        }
        .lda-map-wrap {
            width: 100%;
        }
        .lda-map-wrap svg {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        /* ── ON-MAP LABELS ── styled to match the info-card treatment used in the
     Parcel Reports hero animation: white card, colored top accent + bold
     uppercase zone code in that category's color, soft gray description,
     soft drop shadow for elevation. */
        .lda-label {
            pointer-events: none;
        }
        .lda-label-bg {
            fill: #fff;
            fill-opacity: 0.95;
            filter: url(#ldaCardShadow);
        }
        .lda-label-accent {
            stroke: none;
        }
        .lda-label-abbr {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: 7.5px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-anchor: middle;
        }
        .lda-label-name {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 400;
            font-size: 5.8px;
            fill: #5a5a5a;
            text-anchor: middle;
        }
        /* per-category accent colors — mirrors each zone's color-coded border-top
     and zone-code text in the Parcel Reports card animation */
        .lda-label-c1 .lda-label-accent,
        .lda-label-c1 .lda-label-abbr {
            fill: #6a95b8;
        }
        .lda-label-c2 .lda-label-accent,
        .lda-label-c2 .lda-label-abbr {
            fill: #c8925a;
        }
        .lda-label-c3 .lda-label-accent,
        .lda-label-c3 .lda-label-abbr {
            fill: #7aaa58;
        }
        .lda-label-c4 .lda-label-accent,
        .lda-label-c4 .lda-label-abbr {
            fill: #8a72c0;
        }
        .lda-label-c5 .lda-label-accent,
        .lda-label-c5 .lda-label-abbr {
            fill: #c2685c;
        }

        /* ── DISTRICT FILL ANIMATION ──
     Single 20s loop: each of the 5 categories fades in slowly, passing
     through a brighter pastel "sheen" highlight on its way to a soft,
     pastel final tone, then holds, then fades back to neutral before looping. */
        .lda-poly {
            stroke: #a59e98;
            stroke-width: 0.4px;
            stroke-miterlimit: 10;
        }
        .lda-c1 {
            animation: ldaRevealC1 20s ease-in-out infinite;
        }
        .lda-c2 {
            animation: ldaRevealC2 20s ease-in-out infinite;
        }
        .lda-c3 {
            animation: ldaRevealC3 20s ease-in-out infinite;
        }
        .lda-c4 {
            animation: ldaRevealC4 20s ease-in-out infinite;
        }
        .lda-c5 {
            animation: ldaRevealC5 20s ease-in-out infinite;
        }

        @keyframes ldaRevealC2 {
            /* Institutional, Educational — pastel #ecd9c5, sheen #f5ebe1 */
            0% {
                fill: #d8d4cf;
            }
            3% {
                fill: #f5ebe1;
            }
            6% {
                fill: #ecd9c5;
            }
            75% {
                fill: #ecd9c5;
            }
            88%,
            100% {
                fill: #d8d4cf;
            }
        }
        @keyframes ldaRevealC5 {
            /* Business, Limited — pastel #eacac6, sheen #f4e4e2 */
            0%,
            10% {
                fill: #d8d4cf;
            }
            13% {
                fill: #f4e4e2;
            }
            16% {
                fill: #eacac6;
            }
            75% {
                fill: #eacac6;
            }
            88%,
            100% {
                fill: #d8d4cf;
            }
        }
        @keyframes ldaRevealC4 {
            /* Residence, General — pastel #d6cee9, sheen #eae6f4 */
            0%,
            20% {
                fill: #d8d4cf;
            }
            23% {
                fill: #eae6f4;
            }
            26% {
                fill: #d6cee9;
            }
            75% {
                fill: #d6cee9;
            }
            88%,
            100% {
                fill: #d8d4cf;
            }
        }
        @keyframes ldaRevealC1 {
            /* Business, Office — pastel #cadae6, sheen #e4ecf2 */
            0%,
            30% {
                fill: #d8d4cf;
            }
            33% {
                fill: #e4ecf2;
            }
            36% {
                fill: #cadae6;
            }
            75% {
                fill: #cadae6;
            }
            88%,
            100% {
                fill: #d8d4cf;
            }
        }
        @keyframes ldaRevealC3 {
            /* Residence, Limited — pastel #d0e1c5, sheen #e7f0e1 */
            0%,
            40% {
                fill: #d8d4cf;
            }
            43% {
                fill: #e7f0e1;
            }
            46% {
                fill: #d0e1c5;
            }
            75% {
                fill: #d0e1c5;
            }
            88%,
            100% {
                fill: #d8d4cf;
            }
        }

        /* On-map label fade, synced to each category's fill ramp */
        .lda-label-c2 {
            animation: ldaLabelC2 20s ease-in-out infinite;
        }
        .lda-label-c5 {
            animation: ldaLabelC5 20s ease-in-out infinite;
        }
        .lda-label-c4 {
            animation: ldaLabelC4 20s ease-in-out infinite;
        }
        .lda-label-c1 {
            animation: ldaLabelC1 20s ease-in-out infinite;
        }
        .lda-label-c3 {
            animation: ldaLabelC3 20s ease-in-out infinite;
        }

        @keyframes ldaLabelC2 {
            0% {
                opacity: 0;
            }
            6% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            88%,
            100% {
                opacity: 0;
            }
        }
        @keyframes ldaLabelC5 {
            0%,
            10% {
                opacity: 0;
            }
            16% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            88%,
            100% {
                opacity: 0;
            }
        }
        @keyframes ldaLabelC4 {
            0%,
            20% {
                opacity: 0;
            }
            26% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            88%,
            100% {
                opacity: 0;
            }
        }
        @keyframes ldaLabelC1 {
            0%,
            30% {
                opacity: 0;
            }
            36% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            88%,
            100% {
                opacity: 0;
            }
        }
        @keyframes ldaLabelC3 {
            0%,
            40% {
                opacity: 0;
            }
            46% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            88%,
            100% {
                opacity: 0;
            }
        }

        /* Respect reduced-motion preference: settle on the fully-colored map */
        @media (prefers-reduced-motion: reduce) {
            .lda-c1,
            .lda-c2,
            .lda-c3,
            .lda-c4,
            .lda-c5,
            .lda-label-c1,
            .lda-label-c2,
            .lda-label-c3,
            .lda-label-c4,
            .lda-label-c5 {
                animation: none !important;
            }
            .lda-c1 {
                fill: #cadae6;
            }
            .lda-c2 {
                fill: #ecd9c5;
            }
            .lda-c3 {
                fill: #d0e1c5;
            }
            .lda-c4 {
                fill: #d6cee9;
            }
            .lda-c5 {
                fill: #eacac6;
            }
            .lda-label-c1,
            .lda-label-c2,
            .lda-label-c3,
            .lda-label-c4,
            .lda-label-c5 {
                opacity: 1;
            }
        }
    </style>
