<!--
  Zoning Rasters — animated hero graphic (Squarespace Code Block)
  Scanline-sweep concept: uses the real Zoning Districts map geometry/colors
  (no on-map labels). A vertical scanline sweeps left to right, turning the
  district polygons into a matching 30x30m-style raster grid, computed live
  via point-in-polygon sampling against the actual district shapes, then
  sweeps back. Self-contained: no external dependencies.

  Paste this whole block into a Code Block where you want the graphic to
  appear (e.g. the empty column next to your hero text/CTAs on the Rasters
  product page).
-->
<div class="lul-raster-anim">
    <style>
        .lul-raster-anim,
        .lul-raster-anim * {
            box-sizing: border-box;
        }
        .lul-raster-anim {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            max-width: 720px;
        }
        .lra-map-wrap {
            width: 100%;
        }
        .lra-map-wrap svg {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        .lra-poly {
            stroke: #a59e98;
            stroke-width: 0.4px;
            stroke-miterlimit: 10;
        }
        .lra-c1 {
            fill: #cadae6;
        }
        .lra-c2 {
            fill: #ecd9c5;
        }
        .lra-c3 {
            fill: #d0e1c5;
        }
        .lra-c4 {
            fill: #d6cee9;
        }
        .lra-c5 {
            fill: #eacac6;
        }

        @keyframes lraWipe {
            0% {
                clip-path: inset(0 100% 0 0);
            }
            45% {
                clip-path: inset(0 0% 0 0);
            }
            55% {
                clip-path: inset(0 0% 0 0);
            }
            100% {
                clip-path: inset(0 100% 0 0);
            }
        }
        @keyframes lraScan {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }
            3% {
                opacity: 1;
            }
            45% {
                transform: translateX(290.26px);
                opacity: 1;
            }
            47% {
                opacity: 0;
            }
            53% {
                opacity: 0;
            }
            55% {
                transform: translateX(290.26px);
                opacity: 1;
            }
            96% {
                opacity: 1;
            }
            100% {
                transform: translateX(0px);
                opacity: 0;
            }
        }
        .lra-wipe {
            animation: lraWipe 10s ease-in-out infinite;
        }
        .lra-scan {
            animation: lraScan 10s ease-in-out infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            .lra-wipe {
                animation: none;
                clip-path: inset(0 0% 0 0);
            }
            .lra-scan {
                animation: none;
                opacity: 0;
            }
        }
    </style>

<script>
    (function () {
        var svgNS = "http://www.w3.org/2000/svg";
        var colorMap = { c1: "#cadae6", c2: "#ecd9c5", c3: "#d0e1c5", c4: "#d6cee9", c5: "#eacac6" };
        var streetColor = "#dcd8d1";
        // Nearest-centroid fallback assigns this left-edge cell purple at a tie; it belongs to the green district.
        var cellOverrides = { "1,6": "c3", "4,10": "c3", "4,11": "c3" };
        var polyEls = document.querySelectorAll("#lraDistrict polygon");
        var polys = [];
        polyEls.forEach(function (el) {
            var cls = el.getAttribute("class") || "";
            var m = cls.match(/lra-(c[1-5])/);
            if (!m) return;
            var nums = el.getAttribute("points").trim().split(/\s+/).map(Number);
            var pts = [];
            for (var k = 0; k < nums.length; k += 2) pts.push([nums[k], nums[k + 1]]);
            var cxSum = 0,
                cySum = 0;
            for (var q = 0; q < pts.length; q++) {
                cxSum += pts[q][0];
                cySum += pts[q][1];
            }
            polys.push({ cat: m[1], pts: pts, cx: cxSum / pts.length, cy: cySum / pts.length });
        });

        function pointInPoly(x, y, pts) {
            var inside = false;
            for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                var xi = pts[i][0],
                    yi = pts[i][1],
                    xj = pts[j][0],
                    yj = pts[j][1];
                if (yi > y !== yj > y && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) inside = !inside;
            }
            return inside;
        }

        var vbW = 290.26,
            vbH = 247.69;
        var cols = 22,
            rows = 19;
        var cw = vbW / cols,
            ch = vbH / rows;
        var raster = document.getElementById("lraRaster");

        for (var j = 0; j < rows; j++) {
            for (var i = 0; i < cols; i++) {
                var cx = (i + 0.5) * cw,
                    cy = (j + 0.5) * ch;
                var hit = null;
                for (var p = 0; p < polys.length; p++) {
                    if (pointInPoly(cx, cy, polys[p].pts)) {
                        hit = polys[p].cat;
                        break;
                    }
                }
                var isBorderCell = i === 0 || i === cols - 1 || j === 0 || j === rows - 1;
                var fillColor;
                if (hit) {
                    fillColor = colorMap[hit];
                } else if (isBorderCell) {
                    fillColor = streetColor;
                } else {
                    var best = null,
                        bestDist = Infinity;
                    for (var n = 0; n < polys.length; n++) {
                        var dx = polys[n].cx - cx,
                            dy = polys[n].cy - cy;
                        var d = dx * dx + dy * dy;
                        if (d < bestDist) {
                            bestDist = d;
                            best = polys[n].cat;
                        }
                    }
                    fillColor = best ? colorMap[best] : streetColor;
                }
                var ov = cellOverrides[i + "," + j];
                if (ov) fillColor = colorMap[ov];
                var rect = document.createElementNS(svgNS, "rect");
                rect.setAttribute("x", i * cw);
                rect.setAttribute("y", j * ch);
                rect.setAttribute("width", cw);
                rect.setAttribute("height", ch);
                rect.setAttribute("fill", fillColor);
                rect.setAttribute("stroke", "rgba(57,51,72,0.15)");
                rect.setAttribute("stroke-width", "0.3");
                raster.appendChild(rect);
            }
        }
    })();
</script>
