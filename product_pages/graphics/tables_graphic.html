<!--
  Zoning Tables — animated hero graphic (Squarespace Code Block)
  Paste this whole block into a Code Block where you want the graphic to
  appear (e.g. the empty column next to the hero text/CTAs on /tables-new).
  Self-contained: no external dependencies, all styles scoped under
  .lul-tables-anim so it won't collide with Squarespace's own CSS.

  Concept: a soft highlight scans left to right across the table's columns,
  one at a time, as a smooth opacity pulse (no hard edges/scroll). 6 fixed
  columns, fits without horizontal overflow. 18s loop, pure CSS.
-->
<div class="lul-tables-anim">
    <style>
        .lul-tables-anim,
        .lul-tables-anim * {
            box-sizing: border-box;
        }
        .lul-tables-anim {
            --ltta-navy: #393348;
            --ltta-white: #fff;
            --ltta-muted: rgba(57, 51, 72, 0.5);
            --ltta-border: rgba(57, 51, 72, 0.12);
            /* accent palette — same 5 category accents used on the Districts hero
       map (districts-hero-animation-block.html), plus one teal added to
       cover a 6th column */
            --ltta-a1: 106, 149, 184; /* #6a95b8 blue */
            --ltta-a2: 200, 146, 90; /* #c8925a tan/orange */
            --ltta-a3: 122, 170, 88; /* #7aaa58 green */
            --ltta-a4: 138, 114, 192; /* #8a72c0 purple */
            --ltta-a5: 194, 104, 92; /* #c2685c coral */
            --ltta-a6: 83, 166, 148; /* #53a694 teal */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            max-width: 760px;
            background: #efedec; /* matches product-tabs bg */
        }

        .ltta-card {
            background: var(--ltta-white);
            border-radius: 0;
            overflow: hidden;
            border: 1px solid var(--ltta-border);
        }
        .ltta-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            font-size: 12.5px;
        }
        .ltta-table th:nth-child(1) {
            width: 26%;
        }
        .ltta-table th:nth-child(2) {
            width: 15%;
        }
        .ltta-table th:nth-child(3) {
            width: 16%;
        }
        .ltta-table th:nth-child(4) {
            width: 15%;
        }
        .ltta-table th:nth-child(5) {
            width: 14%;
        }
        .ltta-table th:nth-child(6) {
            width: 14%;
        }
        .ltta-table th {
            position: relative;
            background: #f5f4f0;
            padding: 16px 10px;
            text-align: left;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--ltta-muted);
            border-bottom: 1px solid var(--ltta-border);
            white-space: nowrap;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ltta-table td {
            position: relative;
            padding: 22px 10px;
            border-bottom: 1px solid rgba(57, 51, 72, 0.07);
            color: var(--ltta-navy);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
        }
        .ltta-table tr:last-child td {
            border-bottom: none;
        }
        .ltta-table tr:nth-child(even) td {
            background: rgba(57, 51, 72, 0.02);
        }

        .ltta-jur {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }
        .ltta-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--ltta-navy);
            line-height: 1.2;
        }
        .ltta-sub {
            font-size: 11px;
            color: var(--ltta-muted);
            margin-top: 1px;
            line-height: 1.25;
        }
        .ltta-num {
            font-size: 12.5px;
            color: var(--ltta-navy);
            white-space: nowrap;
        }

        /* ── SMOOTH COLUMN SCAN, ONE ACCENT PER COLUMN ──
     Each column (th + td) animates the same single property — an inset
     box-shadow whose alpha rises and falls like a gentle bell curve — so
     there's no hard edge, no color swap mid-pulse, just a soft tint that
     sweeps left to right, one column at a time, over an 18s loop. Each
     column gets its own accent color from the site's category palette. */
        .ltta-table th,
        .ltta-table td {
            animation-duration: 18s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }
        .ltta-table th:nth-child(1),
        .ltta-table td:nth-child(1) {
            animation-name: ltta-c1;
        }
        .ltta-table th:nth-child(2),
        .ltta-table td:nth-child(2) {
            animation-name: ltta-c2;
        }
        .ltta-table th:nth-child(3),
        .ltta-table td:nth-child(3) {
            animation-name: ltta-c3;
        }
        .ltta-table th:nth-child(4),
        .ltta-table td:nth-child(4) {
            animation-name: ltta-c4;
        }
        .ltta-table th:nth-child(5),
        .ltta-table td:nth-child(5) {
            animation-name: ltta-c5;
        }
        .ltta-table th:nth-child(6),
        .ltta-table td:nth-child(6) {
            animation-name: ltta-c6;
        }

        @keyframes ltta-c1 {
            0% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0);
            }
            2.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0.12);
            }
            5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0.25);
            }
            8% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0.4);
            }
            11% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0.25);
            }
            14% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0.12);
            }
            16%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a1), 0);
            }
        }
        @keyframes ltta-c2 {
            0%,
            12% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0);
            }
            14.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0.12);
            }
            17% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0.25);
            }
            20% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0.4);
            }
            23% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0.25);
            }
            26% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0.12);
            }
            28%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a2), 0);
            }
        }
        @keyframes ltta-c3 {
            0%,
            24% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0);
            }
            26.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0.12);
            }
            29% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0.25);
            }
            32% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0.4);
            }
            35% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0.25);
            }
            38% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0.12);
            }
            40%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a3), 0);
            }
        }
        @keyframes ltta-c4 {
            0%,
            36% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0);
            }
            38.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0.12);
            }
            41% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0.25);
            }
            44% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0.4);
            }
            47% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0.25);
            }
            50% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0.12);
            }
            52%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a4), 0);
            }
        }
        @keyframes ltta-c5 {
            0%,
            48% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0);
            }
            50.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0.12);
            }
            53% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0.25);
            }
            56% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0.4);
            }
            59% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0.25);
            }
            62% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0.12);
            }
            64%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a5), 0);
            }
        }
        @keyframes ltta-c6 {
            0%,
            60% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0);
            }
            62.5% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0.12);
            }
            65% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0.25);
            }
            68% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0.4);
            }
            71% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0.25);
            }
            74% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0.12);
            }
            76%,
            100% {
                box-shadow: inset 0 0 0 999px rgba(var(--ltta-a6), 0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .ltta-table th,
            .ltta-table td {
                animation: none !important;
                box-shadow: none !important;
            }
        }

        /* ── MOBILE BREAKPOINT ──
     Squarespace stacks multi-column sections to full device width on
     mobile, so this block can land in a ~320–420px-wide column. At that
     width, 6 columns of real data won't fit on one line at desktop type
     sizes — so headers/jurisdiction text are allowed to wrap (never
     truncate) and everything shrinks a notch. Same single Code Block,
     no separate mobile setup needed. */
        @media (max-width: 600px) {
            .ltta-table th:nth-child(1) {
                width: 28%;
            }
            .ltta-table th:nth-child(2) {
                width: 13%;
            }
            .ltta-table th:nth-child(3) {
                width: 14%;
            }
            .ltta-table th:nth-child(4) {
                width: 16%;
            }
            .ltta-table th:nth-child(5) {
                width: 14%;
            }
            .ltta-table th:nth-child(6) {
                width: 15%;
            }
            .ltta-table th {
                font-size: 7.5px;
                letter-spacing: 0.03em;
                padding: 9px 5px;
                white-space: normal;
                line-height: 1.25;
                overflow: visible;
                text-overflow: clip;
            }
            .ltta-table td {
                padding: 12px 5px;
            }
            .ltta-name {
                font-size: 12.5px;
            }
            .ltta-sub {
                font-size: 9px;
                white-space: normal;
            }
            .ltta-num {
                font-size: 10px;
            }
        }
    </style>

    <div class="ltta-card">
        <table class="ltta-table">
            <thead>
                <tr>
                    <th>Jurisdiction</th>
                    <th>Total<br />Acres</th>
                    <th>Zonable<br />Acres</th>
                    <th>Districts</th>
                    <th>1-Fam<br />Acres</th>
                    <th>4-Fam<br />Acres</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <div class="ltta-jur">
                            <div class="ltta-name">Washington</div>
                            <div class="ltta-sub">District of Columbia</div>
                        </div>
                    </td>
                    <td class="ltta-num">39,473</td>
                    <td class="ltta-num">31,598</td>
                    <td class="ltta-num">167</td>
                    <td class="ltta-num">17,534</td>
                    <td class="ltta-num">8,716</td>
                </tr>
                <tr>
                    <td>
                        <div class="ltta-jur">
                            <div class="ltta-name">Newport News</div>
                            <div class="ltta-sub">Virginia</div>
                        </div>
                    </td>
                    <td class="ltta-num">43,233</td>
                    <td class="ltta-num">34,131</td>
                    <td class="ltta-num">30</td>
                    <td class="ltta-num">16,677</td>
                    <td class="ltta-num">4,990</td>
                </tr>
                <tr>
                    <td>
                        <div class="ltta-jur">
                            <div class="ltta-name">Surry County</div>
                            <div class="ltta-sub">Virginia</div>
                        </div>
                    </td>
                    <td class="ltta-num">167,665</td>
                    <td class="ltta-num">164,758</td>
                    <td class="ltta-num">14</td>
                    <td class="ltta-num">159,254</td>
                    <td class="ltta-num">157,278</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
