<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            }
            .scene {
                position: relative;
                width: 100%;
                max-width: 1100px;
                padding: 32px;
            }
            .map-wrap {
                position: relative;
                width: 100%;
            }
            .map-wrap svg {
                width: 100%;
                height: auto;
                display: block;
                overflow: visible;
            }
            .parcel {
                fill: rgb(218, 214, 210);
                stroke: rgb(165, 158, 152);
                stroke-width: 0.6px;
                stroke-miterlimit: 10;
                transition:
                    fill 0.25s ease,
                    stroke 0.25s ease,
                    stroke-width 0.25s ease;
            }
            .card {
                position: absolute;
                width: 215px;
                background: white;
                border-radius: 12px;
                padding: 18px 20px;
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.13),
                    0 2px 8px rgba(0, 0, 0, 0.07);
                opacity: 0;
                pointer-events: none;
                border-top: 3px solid #ccc;
                transition: opacity 0.25s ease;
            }
            .card.visible {
                opacity: 1;
            }
            .card-zone {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                margin-bottom: 3px;
            }
            .card-desc {
                font-size: 12px;
                color: #555;
                margin-bottom: 12px;
                line-height: 1.35;
            }
            .card-address {
                font-size: 20px;
                font-weight: 800;
                color: #222;
                margin-bottom: 12px;
                line-height: 1.2;
            }
            .card-divider {
                height: 1px;
                background: #eee;
                margin-bottom: 12px;
            }
            .card-row {
                margin-bottom: 7px;
            }
            .card-label {
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: #aaa;
                margin-bottom: 2px;
            }
            .card-value {
                font-size: 12px;
                color: #333;
                line-height: 1.35;
            }
        </style>
    </head>

        <script>
            const PARCELS = [
                {
                    zone: "IN-S",
                    desc: "Institutional, Educational",
                    color: "#c8925a",
                    uses: "Mixed with Residential",
                    units: "1, 2, 3",
                    address: "32 Hackfeld Rd",
                    d: "M132.74,32l.28-1.66-19.28-1.77.55-3.17,3.41-19.66,38.15,3.7-3.54,20.53-.66,3.8-18.91-1.77",
                    cx: 134.8,
                    cy: 19.75,
                    size: 42.11,
                },
                {
                    zone: "BL-1.0",
                    desc: "Business, Limited",
                    color: "#c2685c",
                    uses: "Mixed with Residential",
                    units: "1, 2, 3, 4+",
                    address: "74 West St",
                    d: "M250.79,236.83l-5.82-.28.02-.39.79-7.96,3.34.15,1.62.09,14.67.74-.72,8.29-13.91-.63",
                    cx: 255.19,
                    cy: 232.84,
                    size: 20.44,
                },
                {
                    zone: "RG-5",
                    desc: "Residence, General",
                    color: "#8a72c0",
                    uses: "Primarily Residential",
                    units: "1, 2, 3, 4+",
                    address: "5 Trowbridge Rd",
                    d: "M184.08,105.22l-15.94,1.33.17-1.18,1.47-9.42.94-6.03.28-1.88,20.07,1.92-2.56,14.89-4.44.37",
                    cx: 179.61,
                    cy: 97.29,
                    size: 22.93,
                },
                {
                    zone: "BO-1.0",
                    desc: "Business, Office",
                    color: "#6a95b8",
                    uses: "Mixed with Residential",
                    units: "1, 2, 3, 4+",
                    address: "201 Park Ave",
                    d: "M42.79,47.2l-16.07-1.2,1.07-7.13,16.09,1.16-.5,3.35-.59,3.83",
                    cx: 35.3,
                    cy: 43.04,
                    size: 17.16,
                },
                {
                    zone: "RL-7",
                    desc: "Residence, Limited",
                    color: "#7aaa58",
                    uses: "Primarily Residential",
                    units: "1, 2",
                    address: "17-19 Somerset St",
                    d: "M46.05,189.05l-20.01-1.66.74-4.77.17-1.22.2-1.31,19.96,1.79-.17,1.16-.9,6.01",
                    cx: 36.57,
                    cy: 184.57,
                    size: 21.07,
                },
            ];
            const SVG_W = 290.22,
                SVG_H = 247.69;
            const CARD_W = 215,
                CARD_H = 160,
                MARGIN = 14;

            const svg = document.getElementById("mainSvg");
            const wrap = document.getElementById("mapWrap");
            const card = document.getElementById("infoCard");
            const pulseRing = document.getElementById("pulseRing");

            const animatedEls = {};
            PARCELS.forEach((p, i) => {
                svg.querySelectorAll(".parcel").forEach((el) => {
                    if (el.getAttribute("d") === p.d) animatedEls[i] = el;
                });
            });

            function positionCard(p) {
                const svgRect = svg.getBoundingClientRect();
                const wrapRect = wrap.getBoundingClientRect();
                const scaleX = svgRect.width / SVG_W;
                const scaleY = svgRect.height / SVG_H;
                const px = svgRect.left - wrapRect.left + p.cx * scaleX;
                const py = svgRect.top - wrapRect.top + p.cy * scaleY;
                const wW = wrapRect.width;
                const wH = wrapRect.height;

                let left;
                if (wW - px >= CARD_W + MARGIN * 3) {
                    left = px + MARGIN * 3;
                } else if (px >= CARD_W + MARGIN * 3) {
                    left = px - CARD_W - MARGIN * 3;
                } else {
                    left = Math.max(MARGIN, Math.min(px - CARD_W / 2, wW - CARD_W - MARGIN));
                }
                let top = py - CARD_H / 2;
                top = Math.max(MARGIN, Math.min(top, wH - CARD_H - MARGIN));

                card.style.left = left + "px";
                card.style.top = top + "px";
                card.style.right = "auto";
            }

            let current = -1;
            let pulseAnim = null;

            function animatePulse(color, size) {
                if (pulseAnim) cancelAnimationFrame(pulseAnim);
                let start = null;
                const DURATION = 900;
                const rStart = size * 0.18;
                const rEnd = size * 0.75;
                function step(ts) {
                    if (!start) start = ts;
                    const t = Math.min((ts - start) / DURATION, 1);
                    const r = rStart + t * (rEnd - rStart);
                    const op = (1 - t) * 0.7;
                    pulseRing.setAttribute("r", r);
                    pulseRing.setAttribute("opacity", op);
                    if (t < 1) pulseAnim = requestAnimationFrame(step);
                    else pulseRing.setAttribute("opacity", 0);
                }
                pulseRing.setAttribute("stroke", color);
                pulseRing.setAttribute("stroke-width", "0.6");
                pulseAnim = requestAnimationFrame(step);
            }

            function showParcel(idx) {
                if (current >= 0 && animatedEls[current]) {
                    const prev = animatedEls[current];
                    prev.style.fill = "";
                    prev.style.stroke = "";
                    prev.style.strokeWidth = "";
                    prev.style.filter = "";
                }
                card.classList.remove("visible");

                current = idx;
                const p = PARCELS[idx];
                const el = animatedEls[idx];

                if (el) {
                    el.style.fill = p.color;
                    el.style.stroke = p.color;
                    el.style.strokeWidth = "0.8px";
                    el.style.filter = `drop-shadow(0 0 1.5px ${p.color}aa)`;
                    pulseRing.setAttribute("cx", p.cx);
                    pulseRing.setAttribute("cy", p.cy);
                    animatePulse(p.color, p.size);
                }

                document.getElementById("cardZone").textContent = p.zone;
                document.getElementById("cardZone").style.color = p.color;
                document.getElementById("cardDesc").textContent = p.desc;
                document.getElementById("cardAddress").textContent = p.address;
                document.getElementById("cardAddress").style.color = p.color;
                document.getElementById("cardUses").textContent = p.uses;
                document.getElementById("cardUnits").textContent = p.units;
                card.style.borderTopColor = p.color;

                positionCard(p);
                requestAnimationFrame(() => card.classList.add("visible"));
            }

            function next() {
                showParcel((current + 1) % PARCELS.length);
                setTimeout(next, 3400);
            }

            setTimeout(next, 600);
        </script>
