<!--
  Zoning Slices — animated hero graphic (Squarespace Code Block)
  Built directly from Diana's slices.svg reference artwork: real base
  district polygons (5 zoning categories) with real overlay-tint shapes
  layered on top of them (some are duplicate-footprint tints, some are
  hand-clipped slivers where an overlay boundary cuts mid-parcel) — this
  is the actual base+overlay "Slice" mosaic, not an approximated shape.

  Animation: the 5 base categories sit at low saturation from the start
  (no reveal, no labels). Steps 1–3: the overlay layers (lsa-c6 indigo,
  lsa-c7 teal, lsa-c8 amber) fade in one at a time — tint first, then a
  lighter-toned outline crisps in a beat later, tracing the new "Slice"
  shape. Step 4: once all three overlays have finished, the remaining
  base-district outlines (lighter tint of each one's own hue) crisp in
  together. Everything holds, then all fades out together, then loops.

  Self-contained: no external dependencies, all classes prefixed lsa-
  (renamed from the source file's generic cls- names) and scoped under
  .lul-slices-anim so they won't collide with Squarespace's own CSS.
-->
<div class="lul-slices-anim">
    <style>
        .lul-slices-anim,
        .lul-slices-anim * {
            box-sizing: border-box;
        }
        .lul-slices-anim {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            max-width: 720px;
            background: #efedec; /* matches product-tabs bg */
            padding: 32px;
        }
        .lda-map-wrap {
            width: 100%;
        }
        .lda-map-wrap svg {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        /* ── Base districts: fill always visible, muted/low-saturation tones.
     Outlines are a glowy white (matching the soft-light feel of the
     overlay outlines), revealed as a 4th step: they crisp in together
     only after all three overlays have finished revealing — see
     keyframes below — instead of being on from the start. ── */
        .lsa-c1,
        .lsa-c2,
        .lsa-c3,
        .lsa-c4,
        .lsa-c5 {
            stroke: #fff;
            stroke-miterlimit: 10;
            stroke-width: 1px;
            animation: lsaBaseOutline 18s ease-in-out infinite;
        }
        .lsa-c1 {
            fill: #d7d1dc;
        } /* was #8a72c0 */
        .lsa-c2 {
            fill: #d1d7db;
        } /* was #6a95b8 */
        .lsa-c3 {
            fill: #d4dbca;
        } /* was #7aaa58 */
        .lsa-c4 {
            fill: #e2d7ca;
        } /* was #c8925a */
        .lsa-c5 {
            fill: #e1cfcb;
        } /* was #c2685c */

        /* Step 4: base-shape outlines crisp in (stroke + glow together) once
     all three overlay steps (which finish revealing at 44%) are done,
     then hold and fade with everything else. */
        @keyframes lsaBaseOutline {
            0%,
            48% {
                stroke-opacity: 0;
            }
            54% {
                stroke-opacity: 1;
            }
            78% {
                stroke-opacity: 1;
            }
            90%,
            100% {
                stroke-opacity: 0;
            }
        }

        /* ── Overlay tint shapes — refreshed palette (indigo / teal / amber),
     each with a lighter-toned outline that crisps in just after its
     tint settles, tracing the new "Slice" shape the overlay created.
     Stronger fill, crisper outline, and a soft drop-shadow lift the
     new slices visually off the base mosaic for more distinction. ── */
        .lsa-c6 {
            fill: #9098cc; /* muted indigo (was #5b6ee8) */
            stroke: #fff;
            stroke-width: 1.3px;
            opacity: 1;
        }
        .lsa-c7 {
            fill: #7cb2a6; /* muted teal (was #34a893) */
            stroke: #fff;
            stroke-width: 1.3px;
            opacity: 1;
        }
        .lsa-c8 {
            fill: #d5b077; /* muted amber (was #d98e2b) */
            stroke: #fff;
            stroke-width: 1.3px;
            opacity: 1;
        }

        /* ── 18s loop: base stays static. For each overlay, in sequence —
     the tint fades in (fill-opacity), then its lighter outline crisps
     in (stroke-opacity) a beat later; everything holds, then all three
     tints + outlines fade out together before looping. ── */
        .lsa-c6 {
            animation:
                lsaFillOv6 18s ease-in-out infinite,
                lsaStrokeOv6 18s ease-in-out infinite;
        }
        .lsa-c7 {
            animation:
                lsaFillOv7 18s ease-in-out infinite,
                lsaStrokeOv7 18s ease-in-out infinite;
        }
        .lsa-c8 {
            animation:
                lsaFillOv8 18s ease-in-out infinite,
                lsaStrokeOv8 18s ease-in-out infinite;
        }

        @keyframes lsaFillOv6 {
            0%,
            4% {
                fill-opacity: 0;
            }
            10% {
                fill-opacity: 0.38;
            }
            78% {
                fill-opacity: 0.38;
            }
            90%,
            100% {
                fill-opacity: 0;
            }
        }
        @keyframes lsaFillOv7 {
            0%,
            18% {
                fill-opacity: 0;
            }
            24% {
                fill-opacity: 0.36;
            }
            78% {
                fill-opacity: 0.36;
            }
            90%,
            100% {
                fill-opacity: 0;
            }
        }
        @keyframes lsaFillOv8 {
            0%,
            32% {
                fill-opacity: 0;
            }
            38% {
                fill-opacity: 0.4;
            }
            78% {
                fill-opacity: 0.4;
            }
            90%,
            100% {
                fill-opacity: 0;
            }
        }

        @keyframes lsaStrokeOv6 {
            0%,
            10% {
                stroke-opacity: 0;
            }
            16% {
                stroke-opacity: 1;
            }
            78% {
                stroke-opacity: 1;
            }
            90%,
            100% {
                stroke-opacity: 0;
            }
        }
        @keyframes lsaStrokeOv7 {
            0%,
            24% {
                stroke-opacity: 0;
            }
            30% {
                stroke-opacity: 1;
            }
            78% {
                stroke-opacity: 1;
            }
            90%,
            100% {
                stroke-opacity: 0;
            }
        }
        @keyframes lsaStrokeOv8 {
            0%,
            38% {
                stroke-opacity: 0;
            }
            44% {
                stroke-opacity: 1;
            }
            78% {
                stroke-opacity: 1;
            }
            90%,
            100% {
                stroke-opacity: 0;
            }
        }

        /* Respect reduced-motion preference: settle on the fully-flattened mosaic */
        @media (prefers-reduced-motion: reduce) {
            .lsa-c1,
            .lsa-c2,
            .lsa-c3,
            .lsa-c4,
            .lsa-c5,
            .lsa-c6,
            .lsa-c7,
            .lsa-c8 {
                animation: none !important;
                stroke-opacity: 1 !important;
            }
            .lsa-c1,
            .lsa-c2,
            .lsa-c3,
            .lsa-c4,
            .lsa-c5 {
                filter: none !important;
            }
            .lsa-c6 {
                fill-opacity: 0.38 !important;
            }
            .lsa-c7 {
                fill-opacity: 0.36 !important;
            }
            .lsa-c8 {
                fill-opacity: 0.4 !important;
            }
        }
    </style>
