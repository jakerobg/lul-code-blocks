<style>
    .lul-data-actions {
        --lul-data-header: #393348;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--lul-data-header);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        align-items: center;
        justify-content: left;
        gap: 18px;
        flex-wrap: wrap;
    }
    .lul-data-actions *,
    .lul-data-actions *::before,
    .lul-data-actions *::after {
        box-sizing: border-box;
    }

    .lul-data-actions .lul-data__btn {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 500;
        font-size: 1rem;
        padding: 14px 26px;
        border-radius: 0;
        text-decoration: none;
        letter-spacing: 0.02em;
        border: 1px solid #393347;
        cursor: pointer;
        transition:
            background 0.25s ease,
            color 0.25s ease,
            gap 0.25s ease;
    }
    .lul-data-actions .lul-data__btn--primary {
        background: #393347;
        color: #ffffff;
    }
    .lul-data-actions .lul-data__btn--primary:hover {
        background: #4c4460;
        border-color: #4c4460;
        gap: 12px;
    }
    .lul-data-actions .lul-data__btn--secondary {
        background: transparent;
        color: #393347;
    }
    .lul-data-actions .lul-data__btn--secondary:hover {
        background: #393347;
        color: #ffffff;
        gap: 12px;
    }
    .lul-data-actions .lul-data__or {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--lul-data-header);
        font-size: 1rem;
        opacity: 0.7;
    }
    .lul-data-actions .lul-data__btn svg {
        width: 14px;
        height: 14px;
        transition: transform 0.25s ease;
    }
    .lul-data-actions .lul-data__btn:hover svg {
        transform: translateX(2px);
    }
</style>

<div class="lul-data-actions">
    <a
        class="lul-data__btn lul-data__btn--primary"
        href="https://docs.google.com/spreadsheets/d/17nrhEbS1OuwdRotXZwyiKmVuKccYH1A3/edit?gid=386090160#gid=386090160"
        >Data Dictionary
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
                d="M4 10h12m0 0l-5-5m5 5l-5 5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </a>
    <a
        class="lul-data__btn lul-data__btn--secondary"
        href="https://www.landuselabs.com/s/zoning_tables_jurisdiction_sample.csv"
        >Download Sample
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
                d="M4 10h12m0 0l-5-5m5 5l-5 5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </a>
</div>
