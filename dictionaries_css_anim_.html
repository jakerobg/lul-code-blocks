<style>
    .lul-dicts {
        --lul-header: #393348;
        --lul-text: #333333;
        --lul-card: #fafaf7;
        --lul-border: rgba(57, 51, 72, 0.08);
        --lul-bg: rgb(239, 237, 236);
        --a1: 106, 149, 184; /* blue */
        --a2: 200, 146, 90; /* tan */
        --a3: 122, 170, 88; /* green */
        --a4: 138, 114, 192; /* purple */
        --a5: 194, 104, 92; /* coral */
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--lul-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        max-width: none;
        width: 100%;
        margin: 0;
        padding: 8px 0;
        box-sizing: border-box;
    }
    .lul-dicts *,
    .lul-dicts *::before,
    .lul-dicts *::after {
        box-sizing: border-box;
    }

    .lul-dicts__grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 300px));
        justify-content: center;
        gap: 24px;
        padding: 12px 15px 16px;
    }

    .lul-card {
        background: var(--lul-card);
        border: 1px solid var(--lul-border);
        border-radius: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        position: relative;
        transition:
            transform 0.1s ease,
            box-shadow 0.2s ease;
        box-shadow: 0 1px 3px rgba(57, 51, 72, 0.05);
    }
    .lul-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(57, 51, 72, 0.08);
    }
    .lul-card:has(.lul-data__dropdown.lul-is-open) {
        z-index: 100;
    }

    .lul-card__media {
        width: 100%;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        position: relative;
        background: var(--lul-bg);
    }

    /* ───────── preview animations (one moving element each) ───────── */
    .lul-prev {
        position: absolute;
        inset: 0;
        overflow: hidden;
    }

    /* Parcel Reports — grid of parcels, one pulsing */
    .lul-prev--map {
        display: grid;
        place-items: center;
    }
    .lul-prev--map .g {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        width: 70%;
    }
    .lul-prev--map .g span {
        aspect-ratio: 1;
        background: rgb(214, 210, 206);
        border-radius: 3px;
    }
    .lul-prev--map .g span.pin {
        animation: lul-pin 2.6s ease-in-out infinite;
    }
    @keyframes lul-pin {
        0%,
        100% {
            background: rgb(214, 210, 206);
            transform: scale(1);
        }
        50% {
            background: rgba(var(--a1), 0.95);
            transform: scale(1.12);
        }
    }

    /* Zoning Districts — colored bands with a light sweep */
    .lul-prev--bands {
        display: flex;
        flex-direction: column;
    }
    .lul-prev--bands i {
        flex: 1;
    }
    .lul-prev--bands i:nth-child(1) {
        background: rgba(var(--a1), 0.5);
    }
    .lul-prev--bands i:nth-child(2) {
        background: rgba(var(--a2), 0.5);
    }
    .lul-prev--bands i:nth-child(3) {
        background: rgba(var(--a3), 0.5);
    }
    .lul-prev--bands i:nth-child(4) {
        background: rgba(var(--a4), 0.5);
    }
    .lul-prev--bands i:nth-child(5) {
        background: rgba(var(--a5), 0.5);
    }
    .lul-prev--bands .sweep {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 38%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        animation: lul-sweep 3.2s linear infinite;
    }
    @keyframes lul-sweep {
        0% {
            transform: translateX(-120%);
        }
        100% {
            transform: translateX(360%);
        }
    }

    /* Zoning Slices — base polygons + an overlay tint pulsing */
    .lul-prev--slices {
        display: grid;
        place-items: center;
    }
    .lul-prev--slices .poly {
        position: absolute;
        width: 42%;
        aspect-ratio: 1;
        transform: rotate(45deg);
        border-radius: 6px;
    }
    .lul-prev--slices .b1 {
        left: 22%;
        top: 26%;
        background: rgba(var(--a3), 0.55);
    }
    .lul-prev--slices .b2 {
        left: 42%;
        top: 34%;
        background: rgba(var(--a1), 0.55);
    }
    .lul-prev--slices .ov {
        left: 33%;
        top: 30%;
        background: rgba(var(--a4), 0.85);
        animation: lul-overlay 2.8s ease-in-out infinite;
    }
    @keyframes lul-overlay {
        0%,
        100% {
            opacity: 0.15;
            transform: rotate(45deg) scale(0.9);
        }
        50% {
            opacity: 0.9;
            transform: rotate(45deg) scale(1);
        }
    }

    /* Zoning Tables — table rows with a column-scan */
    .lul-prev--table {
        display: grid;
        place-items: center;
    }
    .lul-prev--table .t {
        position: relative;
        width: 74%;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .lul-prev--table .t .row {
        height: 12px;
        display: flex;
        gap: 6px;
    }
    .lul-prev--table .t .row.head span {
        background: rgba(57, 51, 72, 0.28);
    }
    .lul-prev--table .t .row span {
        flex: 1;
        background: rgba(57, 51, 72, 0.1);
        border-radius: 2px;
    }
    .lul-prev--table .scan {
        position: absolute;
        top: -4px;
        bottom: -4px;
        width: 22%;
        border-radius: 3px;
        background: rgba(var(--a1), 0.3);
        box-shadow: inset 0 0 0 1px rgba(var(--a1), 0.5);
        animation: lul-colscan 3.4s ease-in-out infinite;
    }
    @keyframes lul-colscan {
        0%,
        100% {
            transform: translateX(0);
        }
        50% {
            transform: translateX(340%);
        }
    }

    /* Zoning Rasters — fine grid with a scanline tinting it */
    .lul-prev--raster {
        display: grid;
        place-items: center;
    }
    .lul-prev--raster .r {
        position: relative;
        width: 72%;
        aspect-ratio: 4 / 3;
        background-image:
            linear-gradient(rgba(57, 51, 72, 0.12) 1px, transparent 1px),
            linear-gradient(90deg, rgba(57, 51, 72, 0.12) 1px, transparent 1px);
        background-size: 12.5% 16.66%;
        background-color: rgba(var(--a3), 0.12);
    }
    .lul-prev--raster .line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 14%;
        background: linear-gradient(90deg, rgba(var(--a2), 0) 0%, rgba(var(--a2), 0.55) 50%, rgba(var(--a2), 0) 100%);
        animation: lul-scanline 3s linear infinite;
    }
    @keyframes lul-scanline {
        0% {
            transform: translateX(-50%);
        }
        100% {
            transform: translateX(680%);
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .lul-prev * {
            animation: none !important;
        }
    }

    .lul-card__body {
        padding: 28px 25px 32px;
        display: flex;
        flex-direction: column;
        flex: 1;
    }
    .lul-card__title {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1.55rem;
        font-weight: 500;
        color: var(--lul-header);
        margin: 0 0 60px;
        letter-spacing: -0.015em;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }
    .lul-card__action {
        align-self: stretch;
    }

    /* plain button (button.html style) */
    .lul-card__btn {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #393347;
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        font-size: 1rem;
        padding: 14px 26px;
        border-radius: 0;
        border: 1px solid #393347;
        transition:
            background 0.25s ease,
            gap 0.25s ease;
        cursor: pointer;
        letter-spacing: 0.02em;
        white-space: nowrap;
    }
    .lul-card__btn:hover {
        background: #4c4460;
        gap: 12px;
    }
    .lul-card__btn svg {
        width: 14px;
        height: 14px;
        transition: transform 0.25s ease;
    }
    .lul-card__btn:hover svg {
        transform: translateX(2px);
    }

    /* dropdown buttons (data_sample / raster dropdown style), full width inside cards */
    .lul-dicts .lul-data-actions {
        display: block;
        width: 100%;
        gap: 0;
    }
    .lul-dicts .lul-data__dropdown {
        position: relative;
        display: block;
        width: 100%;
    }
    .lul-dicts .lul-data__btn {
        -webkit-appearance: none;
        appearance: none;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 500;
        font-size: 1rem;
        line-height: 1.2;
        padding: 14px 26px;
        border-radius: 0;
        text-decoration: none;
        letter-spacing: 0.02em;
        border: 1px solid #393347;
        cursor: pointer;
        transition:
            background 0.25s ease,
            color 0.25s ease,
            gap 0.25s ease;
    }
    .lul-dicts .lul-data__btn--primary {
        background: #393347;
        color: #ffffff;
    }
    .lul-dicts .lul-data__btn--primary:hover {
        background: #4c4460;
        border-color: #4c4460;
        gap: 12px;
    }
    .lul-dicts .lul-data__btn svg {
        width: 14px;
        height: 14px;
        transition: transform 0.25s ease;
    }
    .lul-dicts .lul-data__dropdown.lul-is-open .lul-data__btn svg {
        transform: rotate(180deg);
    }
    .lul-dicts .lul-data__menu {
        position: absolute;
        top: calc(100% - 1px);
        left: 0;
        min-width: 100%;
        background: #ffffff;
        border: 1px solid #393347;
        z-index: 50;
        display: none;
        flex-direction: column;
    }
    .lul-dicts .lul-data__dropdown.lul-is-open .lul-data__menu {
        display: flex;
    }
    .lul-dicts .lul-data__option {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 500;
        font-size: 0.95rem;
        color: #393347;
        text-decoration: none;
        white-space: nowrap;
        padding: 14px 26px;
        border-bottom: 1px solid rgba(57, 51, 71, 0.15);
        transition:
            background 0.2s ease,
            color 0.2s ease;
    }
    .lul-dicts .lul-data__option:last-child {
        border-bottom: none;
    }
    .lul-dicts .lul-data__option:hover {
        background: #393347;
        color: #ffffff;
    }

    @media (max-width: 1200px) {
        .lul-dicts__grid {
            grid-template-columns: repeat(2, minmax(0, 360px));
        }
        .lul-card__title {
            margin-bottom: 40px;
        }
    }
    @media (max-width: 620px) {
        .lul-dicts__grid {
            grid-template-columns: minmax(0, 420px);
            gap: 16px;
            padding: 8px 16px 12px;
        }
        .lul-card__body {
            padding: 22px 22px 26px;
        }
        .lul-card__title {
            font-size: 1.4rem;
            margin-bottom: 40px;
        }
    }
</style>

<script>
    (function () {
        var dropdowns = document.querySelectorAll(".lul-dicts .lul-data__dropdown");
        dropdowns.forEach(function (dd) {
            var toggle = dd.querySelector(".lul-data__toggle");
            toggle.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                var isOpen = dd.classList.contains("lul-is-open");
                dropdowns.forEach(function (other) {
                    other.classList.remove("lul-is-open");
                });
                if (!isOpen) dd.classList.add("lul-is-open");
            });
        });
        document.addEventListener("click", function () {
            dropdowns.forEach(function (dd) {
                dd.classList.remove("lul-is-open");
            });
        });
    })();
</script>
