<style>
    .lul-dicts {
        --lul-header: #393348;
        --lul-text: #333333;
        --lul-card: #ffffff;
        --lul-border: rgba(57, 51, 72, 0.08);
        --lul-bg: rgb(239, 237, 236);
        /* vertical padding for the dropdown button — bump this up if the
           dropdown still looks thinner than the plain buttons */
        --lul-dx-btn-py: 14px;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--lul-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        max-width: none;
        width: 100%;
        margin: 0;
        padding: 8px 0;
        box-sizing: border-box;
    }
    .lul-dicts *,
    .lul-dicts *::before,
    .lul-dicts *::after {
        box-sizing: border-box;
    }

    /* Cards reflow to fewer columns before they ever get narrow enough to
     clip the button text — each card never drops below ~240px wide. */
    .lul-dicts__grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        justify-content: center;
        gap: 24px;
        max-width: 1620px;
        margin: 0 auto;
        padding: 12px 15px 16px;
    }

    .lul-card {
        background: var(--lul-card);
        border: 1px solid var(--lul-border);
        border-radius: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        position: relative;
        transition:
            transform 0.1s ease,
            box-shadow 0.2s ease;
        box-shadow: 0 1px 3px rgba(57, 51, 72, 0.05);
    }
    .lul-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(57, 51, 72, 0.08);
    }
    .lul-card:has(.lul-dx__dropdown.lul-dx-open) {
        z-index: 100;
    }

    .lul-card__media {
        width: 100%;
        aspect-ratio: 5 / 4;
        overflow: hidden;
        position: relative;
        background: #ffffff;
        padding: 16px;
    }
    .lul-card__img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    .lul-card__body {
        padding: 28px 25px 32px;
        display: flex;
        flex-direction: column;
        flex: 1;
    }
    .lul-card__title {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1.55rem;
        font-weight: 500;
        color: var(--lul-header);
        margin: 0 0 60px;
        letter-spacing: -0.015em;
        line-height: 1.2;
        /* allow the title to wrap to a second line instead of truncating */
        white-space: normal;
        overflow-wrap: break-word;
        flex: 1;
    }
    .lul-card__action {
        align-self: stretch;
    }

    /* plain button (button.html style) */
    .lul-card__btn {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #393347;
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        font-size: 1rem;
        padding: 14px 26px;
        border-radius: 0;
        border: 1px solid #393347;
        transition:
            background 0.25s ease,
            gap 0.25s ease;
        cursor: pointer;
        letter-spacing: 0.02em;
        white-space: nowrap;
    }
    .lul-card__btn:hover {
        background: #4c4460;
        gap: 12px;
    }
    .lul-card__btn svg {
        width: 14px;
        height: 14px;
        flex: none;
        transition: transform 0.25s ease;
    }
    .lul-card__btn:hover svg {
        transform: translateX(2px);
    }

    /* dropdown buttons (data_sample / raster dropdown style), full width inside cards */
    .lul-dicts .lul-dx-actions {
        display: block !important;
        width: 100% !important;
        gap: 0;
    }
    .lul-dicts .lul-dx-actions .lul-dx__dropdown {
        position: relative;
        display: block !important;
        width: 100% !important;
    }
    .lul-dicts .lul-dx-actions .lul-dx__btn {
        -webkit-appearance: none;
        appearance: none;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        width: 100% !important;
        display: flex !important;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 500;
        font-size: 1rem;
        /* match the plain button's line-height (inherited) so heights line up,
           then fine-tune thickness with --lul-dx-btn-py above */
        padding: var(--lul-dx-btn-py) 26px;
        border-radius: 0;
        text-decoration: none;
        letter-spacing: 0.02em;
        border: 1px solid #393347;
        cursor: pointer;
        white-space: nowrap;
        transition:
            background 0.25s ease,
            color 0.25s ease,
            gap 0.25s ease;
    }
    .lul-dicts .lul-dx-actions .lul-dx__btn--primary {
        background: #393347;
        color: #ffffff;
    }
    .lul-dicts .lul-dx-actions .lul-dx__btn--primary:hover {
        background: #4c4460;
        border-color: #4c4460;
        gap: 12px;
    }
    .lul-dicts .lul-dx-actions .lul-dx__btn svg {
        width: 14px;
        height: 14px;
        flex: none;
        transition: transform 0.25s ease;
    }
    .lul-dicts .lul-dx-actions .lul-dx__dropdown.lul-dx-open .lul-dx__btn svg {
        transform: rotate(180deg);
    }
    .lul-dicts .lul-dx-actions .lul-dx__menu {
        position: absolute;
        top: calc(100% - 1px);
        left: 0;
        min-width: 100%;
        background: #ffffff;
        border: 1px solid #393347;
        z-index: 50;
        display: none;
        flex-direction: column;
    }
    .lul-dicts .lul-dx-actions .lul-dx__dropdown.lul-dx-open .lul-dx__menu {
        display: flex;
    }
    .lul-dicts .lul-dx-actions .lul-dx__option {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 500;
        font-size: 0.95rem;
        color: #393347;
        text-decoration: none;
        white-space: nowrap;
        padding: 14px 26px;
        border-bottom: 1px solid rgba(57, 51, 71, 0.15);
        transition:
            background 0.2s ease,
            color 0.2s ease;
    }
    .lul-dicts .lul-dx-actions .lul-dx__option:last-child {
        border-bottom: none;
    }
    .lul-dicts .lul-dx-actions .lul-dx__option:hover {
        background: #393347;
        color: #ffffff;
    }

    @media (max-width: 620px) {
        .lul-dicts__grid {
            gap: 16px;
            padding: 8px 16px 12px;
        }
        .lul-card__body {
            padding: 22px 22px 26px;
        }
        .lul-card__title {
            font-size: 1.4rem;
            margin-bottom: 40px;
        }
    }
</style>

<script>
    (function () {
        var dropdowns = document.querySelectorAll(".lul-dicts .lul-dx-actions .lul-dx__dropdown");
        dropdowns.forEach(function (dd) {
            var toggle = dd.querySelector(".lul-dx__toggle");
            toggle.addEventListener("click", function (e) {
                e.preventDefault();
                e.stopPropagation();
                var isOpen = dd.classList.contains("lul-dx-open");
                dropdowns.forEach(function (other) {
                    other.classList.remove("lul-dx-open");
                });
                if (!isOpen) dd.classList.add("lul-dx-open");
            });
        });
        document.addEventListener("click", function () {
            dropdowns.forEach(function (dd) {
                dd.classList.remove("lul-dx-open");
            });
        });
    })();
</script>
