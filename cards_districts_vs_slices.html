<style>
    .lul-samples {
        --lul-header: #393348;
        --lul-text: #333333;
        --lul-card: #fafaf7;
        --lul-border: rgba(57, 51, 72, 0.08);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--lul-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        width: 100%;
        margin: 0;
        padding: 8px 0;
        box-sizing: border-box;
    }
    .lul-samples *,
    .lul-samples *::before,
    .lul-samples *::after {
        box-sizing: border-box;
    }

    .lul-samples__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 360px));
        justify-content: center;
        gap: 50px;
        padding: 12px 15px 16px;
    }

    .lul-samples__card {
        background: var(--lul-card);
        border: 1px solid var(--lul-border);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
            transform 0.1s ease,
            box-shadow 0.2s ease;
        box-shadow: 0 1px 3px rgba(57, 51, 72, 0.05);
    }
    .lul-samples__card:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(57, 51, 72, 0.08);
    }

    .lul-samples__media {
        width: 100%;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        position: relative;
    }
    .lul-samples__media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.2s ease;
    }
    .lul-samples__card:hover .lul-samples__media img {
        transform: scale(1.01);
    }

    .lul-samples__body {
        padding: 28px 28px 32px;
        display: flex;
        flex-direction: column;
        flex: 1;
    }
    .lul-samples__title {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1.9rem;
        font-weight: 500;
        color: var(--lul-header);
        margin: 0 0 12px;
        letter-spacing: -0.015em;
        line-height: 1.2;
    }
    .lul-samples__desc {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        color: var(--lul-text);
        margin: 0 0 24px;
        flex: 1;
    }
    .lul-samples__btn {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        align-self: stretch;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #393347;
        color: #ffffff;
        text-decoration: none;
        font-weight: 500;
        font-size: 1rem;
        padding: 14px 18px;
        border-radius: 0;
        transition:
            background 0.25s ease,
            gap 0.25s ease;
        border: 1px solid #393347;
        cursor: pointer;
        letter-spacing: 0.02em;
    }
    .lul-samples__btn:hover {
        background: #4c4460;
        border-color: #4c4460;
        gap: 12px;
    }
    .lul-samples__btn svg {
        width: 16px;
        height: 16px;
        transition: transform 0.25s ease;
    }
    .lul-samples__btn:hover svg {
        transform: translateX(2px);
    }

    @media (max-width: 820px) {
        .lul-samples__grid {
            grid-template-columns: minmax(0, 420px);
            gap: 16px;
        }
        .lul-samples__body {
            padding: 22px 22px 26px;
        }
        .lul-samples__title {
            font-size: 1.5rem;
        }
    }
</style>

<section class="lul-samples" aria-label="Sample downloads">
    <div class="lul-samples__grid">
        <article class="lul-samples__card">
            <div class="lul-samples__media">
                <img
                    src="https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/9d91e4bd-bc6d-4bc0-957a-a4d8d759ea89/districts_updated.png?format=2500w"
                    alt="Zoning Districts"
                    loading="lazy"
                />
            </div>
            <div class="lul-samples__body">
                <h3 class="lul-samples__title">Zoning Districts</h3>
                <p class="lul-samples__desc">Reveal how different districts regulate.</p>
                <a class="lul-samples__btn" href="https://www.landuselabs.com/s/agoura_hills_districts.geojson"
                    >Download Sample
                    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path
                            d="M4 10h12m0 0l-5-5m5 5l-5 5"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </a>
            </div>
        </article>

        <article class="lul-samples__card">
            <div class="lul-samples__media">
                <img
                    src="https://images.squarespace-cdn.com/content/v1/6961cb51f8abb243882b5e71/9e7b5122-eef7-4692-ba53-1c3169978bf0/slices_updated.png?format=2500w"
                    alt="Zoning Slices"
                    loading="lazy"
                />
            </div>
            <div class="lul-samples__body">
                <h3 class="lul-samples__title">Zoning Slices</h3>
                <p class="lul-samples__desc">
                    Reveal how different places are regulated and show the &ldquo;end result&rdquo; of the overlapping
                    district rules.
                </p>
                <a class="lul-samples__btn" href="https://www.landuselabs.com/s/agoura_hills_slices.geojson"
                    >Download Sample
                    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path
                            d="M4 10h12m0 0l-5-5m5 5l-5 5"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                </a>
            </div>
        </article>
    </div>
</section>
