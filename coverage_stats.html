<!--
  Coverage Stats — four square stat cards (Squarespace Code Block).
  Big count-up number fills each card; a smaller muted subheader sits
  beneath it. Numbers tick up from 0 → target the first time the block
  scrolls into view. Values come live from the zoning-atlas coverage API.

  ▶ CONFIG (top of the <script> below): SELECTED lists the 4 cards. Each
    is either a metric key (fetched live from METRICS) or a hardcoded
    { value, label } card.

  Self-contained; all classes prefixed lul-cov- to avoid collisions.
-->
<section class="lul-cov" aria-label="Data coverage statistics">
    <style>
        .lul-cov {
            --lul-header: #393348;
            --lul-card: #eeecef; /* grey card, matches research-band feel */
            --lul-sub: rgba(57, 51, 72, 0.9);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: var(--lul-header);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            width: 100%;
            box-sizing: border-box;
            padding: 12px 0;
        }
        .lul-cov *,
        .lul-cov *::before,
        .lul-cov *::after {
            box-sizing: border-box;
        }

        .lul-cov__grid {
            display: grid;
            /* fixed-width cards, centered — they wrap to the next row
               at each breakpoint instead of stretching to fill. */
            grid-template-columns: repeat(4, 210px);
            justify-content: center;
            gap: 25px;
        }

        .lul-cov__card {
            background: var(--lul-card);
            border-radius: 15px;
            padding: 25px 28px 25px 18px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 210px; /* taller card -> bigger number-to-text gap */
            box-shadow: 2px 6px 10px rgba(57, 51, 72, 0.28);
            text-align: left;
            align-items: flex-start;
        }

        .lul-cov__num {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 400;
            font-size: 3.5rem;
            line-height: 1;
            letter-spacing: -0.03em;
            color: var(--lul-header);
            margin: 0;
        }
        .lul-cov__plus {
            font-size: 0.6em; /* a little smaller than the number */
            font-weight: 400;
            margin-left: 0.15em;
            vertical-align: 0.5em;
        }

        /* uppercase label — same treatment as uppercase_label.html.
           margin-top:auto pins it to the bottom of the card; min-height
           reserves 2 text lines so a 1-line label sits on the SAME top
           line as a 2-line label (labels align by their first line). */
        .lul-cov__sub {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            line-height: 1.4;
            color: #393348;
            opacity: 0.8;
            margin: 0;
            margin-top: auto; /* push label block to the bottom */
            min-height: 2.8em; /* = 2 lines (line-height 1.4 × 2) */
        }

        @media (max-width: 1024px) {
            .lul-cov__grid {
                grid-template-columns: repeat(2, 210px);
            }
        }
        @media (max-width: 500px) {
            .lul-cov__grid {
                /* never exceed the viewport (minus side margins) on tiny screens */
                grid-template-columns: min(230px, calc(100vw - 32px));
                gap: 25px;
            }
            .lul-cov__card {
                min-height: 200px;
                padding: 25px 28px 20px 18px;
            }
            .lul-cov__num {
                font-size: 3.5rem;
            }
        }
    </style>

    <div class="lul-cov__grid" id="lul-cov-grid"></div>

    <script>
        (function () {
            var root = document.currentScript.closest(".lul-cov");
            if (!root) return;
            var grid = root.querySelector("#lul-cov-grid");
            if (!grid) return;

            var API = "https://api.zoningatlas.org/nza_coverage";

            /* ════════════════════════════════════════════════════════════
               1) CHOOSE THE 4 CARDS (in display order). Each entry is either:
                    • a metric KEY (string) from the METRICS registry → fetched live
                    • a HARDCODED card object: { value: 158000000, label: "parcels analyzed" }
                  Mix and match, e.g. 3 live + 1 hardcoded, or all 4 live.
               ════════════════════════════════════════════════════════════ */
            var SELECTED = [
                { value: 90000000, label: "parcels analyzed", plus: true },
                "acres",
                "districts",
                { value: 100, label: "of top-100 most populous cities analyzed", plus: false },
            ];

            /* Show the "+" marker after each number? true = on, false = off.
               A hardcoded card can override this with its own `plus:` property,
               e.g. { value: 186, label: "zoning rules offered", plus: false }. */
            var SHOW_PLUS = true;

            /* ════════════════════════════════════════════════════════════
               2) METRICS REGISTRY — every fetchable stat. Each shows the
                  raw `field` count as the big number (with K / M / B) and
                  `sub` as the uppercase label. `fallback` is used if the
                  live fetch fails.
               ════════════════════════════════════════════════════════════ */
            //   dp   = decimal places on the big number (0 = whole, 1 = tenths)
            //   unit = force "K" | "M" | "B" (omit = auto by magnitude)
            var METRICS = {
                population: {
                    field: "population_covered",
                    sub: "people living in places analyzed",
                    fallback: 216798958,
                    dp: 0,
                },
                acres: { field: "acres_covered", sub: "acres covered", fallback: 1416006966, dp: 1 },
                census_tracts: {
                    field: "tracts_covered",
                    sub: "census tracts covered",
                    fallback: 50547,
                    dp: 0,
                    unit: "K",
                },
                block_groups: { field: "blockgroups_covered", sub: "block groups covered", fallback: 142719, dp: 0 },
                jurisdictions: {
                    field: "jurisdictions_covered",
                    sub: "jurisdictions analyzed",
                    fallback: 10509,
                    dp: 1,
                    unit: "K",
                },
                pages: { field: "pages_analyzed", sub: "zoning pages read", fallback: 1261957, dp: 1 },
                housing_units: {
                    field: "housing_units_covered",
                    sub: "housing units analyzed",
                    fallback: 92236215,
                    dp: 0,
                },
                slices: { field: "slices_total", sub: "slices analyzed", fallback: 169240, dp: 0 },
                districts: { field: "districts_published", sub: "zoning districts analyzed", fallback: 114355, dp: 0 },
            };

            var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            // ── Number formatting ──────────────────────────────────────
            // Round to `dp` decimals; dp 0 → whole number, else drop trailing ".0".
            function roundDp(x, dp) {
                if (dp === 0) return String(Math.round(x));
                return (Math.round(x * 10) / 10).toFixed(1).replace(/\.0$/, "");
            }
            // Format a number with K / M / B. `dp` = decimal places (default 1).
            // `unit` (optional) forces "K" | "M" | "B"; otherwise it's picked by
            // magnitude, and anything under 100,000 is shown with commas.
            function abbr(n, dp, unit) {
                if (dp == null) dp = 1;
                var a = Math.abs(n);
                if (unit === "B" || (!unit && a >= 1e9)) return roundDp(n / 1e9, dp) + "B";
                if (unit === "M" || (!unit && a >= 1e6)) return roundDp(n / 1e6, dp) + "M";
                if (unit === "K" || (!unit && a > 99999)) return roundDp(n / 1e3, dp) + "K";
                return Math.round(n).toLocaleString("en-US");
            }
            // Number + a smaller trailing "+" (e.g. 216.8M+). `show` is the
            // per-card plus flag (defaults on if omitted).
            function withPlus(n, show, dp, unit) {
                if (show === false) return abbr(n, dp, unit);
                return abbr(n, dp, unit) + '<span class="lul-cov__plus">+</span>';
            }

            // ── Build the cards from SELECTED ──────────────────────────
            // Each entry resolves to a def { field (null if hardcoded), sub, fallback, plus }.
            // `plus` defaults to SHOW_PLUS, but a hardcoded card can override it
            // per-card via a `plus: false` (or true) property.
            var defs = SELECTED.map(function (entry) {
                if (typeof entry === "string") {
                    var m = METRICS[entry];
                    if (!m) {
                        // unknown key → warn so the card isn't silently dropped
                        console.warn('[coverage_stats] unknown metric key: "' + entry + '"');
                        return null;
                    }
                    return {
                        field: m.field,
                        sub: m.sub,
                        fallback: m.fallback,
                        plus: SHOW_PLUS,
                        dp: m.dp,
                        unit: m.unit,
                    };
                }
                return {
                    field: null,
                    sub: entry.label,
                    fallback: entry.value,
                    plus: entry.plus !== undefined ? entry.plus : SHOW_PLUS,
                    dp: entry.dp,
                    unit: entry.unit,
                };
            }).filter(Boolean);

            var records = []; // { el, subEl, def, target }
            defs.forEach(function (def) {
                var card = document.createElement("article");
                card.className = "lul-cov__card";
                var num = document.createElement("p");
                num.className = "lul-cov__num";
                num.textContent = "—";
                var sub = document.createElement("p");
                sub.className = "lul-cov__sub";
                card.appendChild(num);
                card.appendChild(sub);
                grid.appendChild(card);
                records.push({ el: num, subEl: sub, def: def, target: null });
            });

            // ── Fill each card from a data row (API row, or null → fallback) ──
            function num(row, field) {
                return field && row && typeof row[field] === "number" ? row[field] : null;
            }
            function populate(row) {
                records.forEach(function (rec) {
                    var def = rec.def;
                    var val = num(row, def.field);
                    if (val === null && typeof def.fallback === "number") val = def.fallback;
                    rec.subEl.textContent = def.sub;
                    rec.target = typeof val === "number" ? val : null;
                    if (rec.target === null) rec.el.textContent = "—";
                    else rec.el.innerHTML = withPlus(rec.target, def.plus, def.dp, def.unit);
                });
            }

            // ── Animation ──────────────────────────────────────────────
            function countUp(rec) {
                if (rec.target === null) return;
                var duration = 1000;
                var start = null;
                function frame(now) {
                    if (start === null) start = now;
                    var p = Math.min((now - start) / duration, 1);
                    var eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
                    // number only while counting; the "+" appears once it lands
                    if (p < 1) {
                        rec.el.textContent = abbr(rec.target * eased, rec.def.dp, rec.def.unit);
                        requestAnimationFrame(frame);
                    } else {
                        rec.el.innerHTML = withPlus(rec.target, rec.def.plus, rec.def.dp, rec.def.unit);
                    }
                }
                requestAnimationFrame(frame);
            }

            var started = false;
            function begin() {
                if (started) return;
                started = true;

                if (reduce || !("IntersectionObserver" in window)) {
                    records.forEach(function (rec) {
                        if (rec.target !== null)
                            rec.el.innerHTML = withPlus(rec.target, rec.def.plus, rec.def.dp, rec.def.unit);
                    });
                    return;
                }
                var byEl = new Map();
                records.forEach(function (rec) {
                    byEl.set(rec.el, rec);
                });
                var io = new IntersectionObserver(
                    function (entries) {
                        entries.forEach(function (entry) {
                            if (entry.isIntersecting) {
                                countUp(byEl.get(entry.target));
                                io.unobserve(entry.target);
                            }
                        });
                    },
                    { threshold: 0.4 },
                );
                records.forEach(function (rec) {
                    io.observe(rec.el);
                });
            }

            // ── Fetch live data, then animate (fall back on failure/timeout) ──
            var timer = setTimeout(function () {
                populate(null);
                begin();
            }, 2500);
            fetch(API, { headers: { Accept: "application/json" } })
                .then(function (r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(function (data) {
                    var row = Array.isArray(data) ? data[0] : data;
                    populate(row || null);
                })
                .catch(function () {
                    populate(null); // keep hardcoded fallbacks where available
                })
                .then(function () {
                    clearTimeout(timer);
                    begin();
                });
        })();
    </script>
</section>
