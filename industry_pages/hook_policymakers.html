<style>
    .lul-hook {
        --lul-header: #393348;
        --lul-accent: #e0e5c2;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--lul-header);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        width: 100%;
        box-sizing: border-box;
        padding-bottom: 20px;
        text-align: left;
    }
    .lul-hook *,
    .lul-hook *::before,
    .lul-hook *::after {
        box-sizing: border-box;
    }

    .lul-hook__headline {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 500;
        font-size: 3.6rem;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin: 0;
        color: var(--lul-header);
    }

    /* Each line masks its own content; the text slides up from
       behind the clipped bottom edge, "revealed" line by line. */
    .lul-hook__line {
        display: block;
        overflow: hidden;
        padding: 0.08em 0; /* room for descenders + accent bg */
    }
    .lul-hook__reveal {
        display: inline-block;
        transform: translateY(110%);
        opacity: 0;
        animation: lul-hook-rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .lul-hook__line--1 .lul-hook__reveal {
        animation-delay: 0.15s;
    }
    .lul-hook__line--2 .lul-hook__reveal {
        animation-delay: 0.75s;
    }

    .lul-hook__accent {
        display: inline;
        /* Highlight is a non-repeating swatch we grow from 0 → full width,
           so it sweeps left→right across the text like a marker stroke. */
        background-image: linear-gradient(var(--lul-accent), var(--lul-accent));
        background-repeat: no-repeat;
        background-position: left center;
        background-size: 0% 100%;
        padding: 0em 0.08em;
        border-radius: 0.01em;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
        font-style: italic;
        /* Starts only after both lines have finished rising (~1.55s). */
        animation: lul-hook-highlight 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.65s forwards;
    }

    @keyframes lul-hook-rise {
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    @keyframes lul-hook-highlight {
        to {
            background-size: 100% 100%;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .lul-hook__reveal {
            transform: none;
            opacity: 1;
            animation: none;
        }
        .lul-hook__accent {
            background-size: 100% 100%;
            animation: none;
        }
    }

    @media (max-width: 800px) {
        .lul-hook__headline {
            font-size: 2.6rem;
        }
    }
</style>

<section class="lul-hook" aria-label="Debating reform? Inform the vote and benchmark your zoning.">
    <h2 class="lul-hook__headline">
        <span class="lul-hook__line lul-hook__line--1">
            <span class="lul-hook__reveal">Debating reform?</span>
        </span>
        <span class="lul-hook__line lul-hook__line--2">
            <span class="lul-hook__reveal">
                Inform the vote and <span class="lul-hook__accent">benchmark your zoning</span>
            </span>
        </span>
    </h2>
</section>
